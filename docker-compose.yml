services:
  app:
    build:
      context: .
      target: runner
    image: satojay-gym:prod
    ports:
      - "${APP_PORT:-3000}:80"
    environment:
      NODE_ENV: production
      PORT: ${PORT:-80}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/satojay_gym?schema=public}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH is required}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?ADMIN_SESSION_SECRET is required}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-satojay_gym}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-satojay_gym}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-prod-data:
