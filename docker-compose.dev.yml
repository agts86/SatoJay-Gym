services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    command: sh -c "pnpm install && pnpm dev --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/satojay_gym?schema=public
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-devcontainer-session-secret-change-me}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-satojay_gym}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
