name: Unit Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "tests/unit/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vitest.config.ts"
      - ".github/workflows/UnitTests.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/unit/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vitest.config.ts"
      - ".github/workflows/UnitTests.yml"

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests with coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.11.1"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:unit:coverage

      - name: Write coverage summary
        if: always()
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require("node:fs");
          const summaryPath = "coverage/unit/coverage-summary.json";

          if (!fs.existsSync(summaryPath)) {
            console.log("## Unit Test Coverage");
            console.log("");
            console.log("Coverage summary was not generated.");
            process.exit(0);
          }

          const summary = JSON.parse(fs.readFileSync(summaryPath, "utf8")).total;
          const rows = ["lines", "statements", "functions", "branches"]
            .map((key) => {
              const value = summary[key];
              return `| ${key} | ${value.pct}% | ${value.covered}/${value.total} |`;
            })
            .join("\n");

          console.log("## Unit Test Coverage");
          console.log("");
          console.log("| Metric | Coverage | Covered / Total |");
          console.log("| --- | ---: | ---: |");
          console.log(rows);
          NODE

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-coverage-report
          path: coverage/unit
          if-no-files-found: warn
