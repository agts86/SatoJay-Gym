name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "tests/e2e/**"
      - "prisma/**"
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - ".github/workflows/E2ETests.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/e2e/**"
      - "prisma/**"
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - ".github/workflows/E2ETests.yml"

permissions:
  contents: read

jobs:
  e2e:
    name: Reservation CV E2E
    runs-on: ubuntu-latest
    env:
      APP_PORT: 3000
      ADMIN_PASSWORD_HASH: '$2b$10$7EqJtq98hPqEX7fNZaFWoOhiZX6bSPK0fHMZE2/X9/y3I5srLqCsa'
      ADMIN_SESSION_SECRET: e2e-session-secret-change-me-32-chars
      E2E_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/satojay_gym?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.11.1"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname = 'satojay_gym'" | grep -q 1 || sudo -u postgres createdb satojay_gym

      - name: Run reservation CV E2E
        run: pnpm test:e2e -- tests/e2e/reservation-cv.spec.ts

      - name: Write E2E summary
        if: always()
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require("node:fs");
          const resultsPath = "test-results/e2e-results.json";

          console.log("## Reservation CV E2E");
          console.log("");
          console.log("| Output | Path |");
          console.log("| --- | --- |");
          console.log("| HTML report | `playwright-report/` |");
          console.log("| Trace, screenshots, videos | `test-results/` |");
          console.log("| JSON result | `test-results/e2e-results.json` |");
          console.log("");

          if (!fs.existsSync(resultsPath)) {
            console.log("JSON result was not generated.");
            process.exit(0);
          }

          const results = JSON.parse(fs.readFileSync(resultsPath, "utf8"));
          const counts = { passed: 0, failed: 0, flaky: 0, skipped: 0, timedOut: 0, interrupted: 0 };

          for (const suite of results.suites ?? []) {
            for (const spec of suite.specs ?? []) {
              for (const test of spec.tests ?? []) {
                const outcome = test.outcome;
                const status = test.results?.at(-1)?.status;
                if (outcome === "expected" || status === "passed") {
                  counts.passed += 1;
                } else if (outcome === "flaky") {
                  counts.flaky += 1;
                } else if (outcome === "skipped" || status === "skipped") {
                  counts.skipped += 1;
                } else if (status === "timedOut") {
                  counts.timedOut += 1;
                } else if (status === "interrupted") {
                  counts.interrupted += 1;
                } else {
                  counts.failed += 1;
                }
              }
            }
          }
          const total = counts.passed + counts.failed + counts.flaky + counts.skipped + counts.timedOut + counts.interrupted;

          console.log("| Metric | Count |");
          console.log("| --- | ---: |");
          console.log(`| Passed | ${counts.passed} |`);
          console.log(`| Failed | ${counts.failed} |`);
          console.log(`| Flaky | ${counts.flaky} |`);
          console.log(`| Timed out | ${counts.timedOut} |`);
          console.log(`| Interrupted | ${counts.interrupted} |`);
          console.log(`| Skipped | ${counts.skipped} |`);
          console.log(`| Total | ${total} |`);
          NODE

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results and evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
