name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "tests/e2e/**"
      - "prisma/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - ".github/workflows/E2ETests.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/e2e/**"
      - "prisma/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "playwright.config.ts"
      - ".github/workflows/E2ETests.yml"

permissions:
  contents: read

jobs:
  e2e:
    name: Reservation CV E2E
    runs-on: ubuntu-latest
    env:
      APP_PORT: 3000
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: satojay_gym
      DATABASE_URL: postgresql://postgres:postgres@db:5432/satojay_gym?schema=public
      ADMIN_PASSWORD_HASH: '$2b$10$7EqJtq98hPqEX7fNZaFWoOhiZX6bSPK0fHMZE2/X9/y3I5srLqCsa'
      ADMIN_SESSION_SECRET: e2e-session-secret-change-me-32-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.11.1"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Build and start disposable stack
        run: docker compose -f docker-compose.yml up -d --build

      - name: Create tables
        run: |
          for migration in prisma/migrations/*/migration.sql; do
            docker compose -f docker-compose.yml exec -T db \
              psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" < "$migration"
          done

      - name: Seed database
        run: |
          docker compose -f docker-compose.yml exec -T db \
            psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" < prisma/seed.sql

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:${APP_PORT}" >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker compose -f docker-compose.yml logs app
          exit 1

      - name: Run reservation CV E2E
        run: pnpm exec playwright test tests/e2e/reservation-cv.spec.ts

      - name: Write E2E summary
        if: always()
        run: |
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require("node:fs");
          const resultsPath = "test-results/e2e-results.json";

          console.log("## Reservation CV E2E");
          console.log("");
          console.log("| Output | Path |");
          console.log("| --- | --- |");
          console.log("| HTML report | `playwright-report/` |");
          console.log("| Trace, screenshots, videos | `test-results/` |");
          console.log("| JSON result | `test-results/e2e-results.json` |");
          console.log("");

          if (!fs.existsSync(resultsPath)) {
            console.log("JSON result was not generated.");
            process.exit(0);
          }

          const results = JSON.parse(fs.readFileSync(resultsPath, "utf8"));
          const counts = { passed: 0, failed: 0, skipped: 0, timedOut: 0, interrupted: 0 };

          for (const suite of results.suites ?? []) {
            for (const spec of suite.specs ?? []) {
              for (const test of spec.tests ?? []) {
                const status = test.outcome ?? test.results?.at(-1)?.status ?? "failed";
                if (status === "expected") {
                  counts.passed += 1;
                } else if (status === "skipped") {
                  counts.skipped += 1;
                } else if (status === "timedOut") {
                  counts.timedOut += 1;
                } else if (status === "interrupted") {
                  counts.interrupted += 1;
                } else {
                  counts.failed += 1;
                }
              }
            }
          }
          const total = counts.passed + counts.failed + counts.skipped + counts.timedOut + counts.interrupted;

          console.log("| Metric | Count |");
          console.log("| --- | ---: |");
          console.log(`| Passed | ${counts.passed} |`);
          console.log(`| Failed | ${counts.failed} |`);
          console.log(`| Timed out | ${counts.timedOut} |`);
          console.log(`| Interrupted | ${counts.interrupted} |`);
          console.log(`| Skipped | ${counts.skipped} |`);
          console.log(`| Total | ${total} |`);
          NODE

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results and evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore

      - name: Stop disposable stack
        if: always()
        run: docker compose -f docker-compose.yml down -v --remove-orphans
